<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personajes</title>
  <link rel="stylesheet" href="/paginaWeb/css/estilo.css" />
</head>
<body>
  <main class="pantalla">
    <section class="pj-personajes">
    <div class="pj-card">
    <div class="pj-fondo" id="pj-fondo"></div>
    <div class="pj-overlay"></div>

    <div class="pj-contenido">
      <h1 id="pj-nombre" class="pj-nombre"></h1>
      <div class="pj-recuadro">Alegría</div>

      <p id="pj-descripcion" class="pj-descripcion"></p>

    </div>

    <img
      id="pj-imagen"
      class="pj-imagen-principal"
      src="paginaWeb/imagenes/personajes.png"
      alt="Kamisato Ayato"
    />

    <div class="pj-lista">
      <button class="pj-mini-card pj-activa" data-id="circe">
        <img src="/paginaWeb/imagenes/Protav1.png" alt="ImagenCrice" />
        <span>Circe</span>
      </button>

      <button class="pj-mini-card" data-id="saloth">
        <img src="/paginaWeb/imagenes/Protav1.png" alt="ImagenSaloth" />
        <span>Saloth</span>
      </button>

      <button class="pj-mini-card" data-id="zuri">
        <img src="/paginaWeb/imagenes/Protav1.png" alt="ImagenZuri" />
        <span>Zuri</span>
      </button>

      <button class="pj-mini-card" data-id="Barbatos">
        <img src="/paginaWeb/imagenes/Protav1.png" alt="ImagenBarbatos" />
        <span>Barbatos</span>
      </button>

      <button class="pj-mini-card" data-id="lynett">
        <img src="/paginaWeb/imagenes/Protav1.png" alt="ImagenLynett" />
        <span>Lynett</span>
      </button>
     </div>
      </div>
    </section>  
  </main>

  <script src="/paginaWeb/js/script.js"></script>
</body>
</html>
