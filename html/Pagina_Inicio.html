<!DOCTYPE html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Somnia</title>
  <link rel="stylesheet" href="/paginaWeb/css/estilo.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="navbar__logo">
      <a href="#">Somnia</a>
    </div>

    <nav class="navbar__menu">
      <a href="#">Videojuego</a>
      <a href="#">Historia</a>
      <a href="#">Islas</a>
      <a href="#">Personajes</a>
      <a href="#">Creadores</a>
    </nav>
  </header>

  <!-- HERO / PORTADA -->
  <main>
    <section class="hero">
      <div class="hero__overlay"></div>
      <!-- Aqui tenemos que poner imagen de fondo con CSS -->
    </section>

    <!-- SECCIÓN INTERACTIVA -->
     <section class="showcase">
     <article class="showcase-card showcase-card--inicio">
    <div class="showcase-card__bg"></div>
    <div class="showcase-card__hover-image"></div>
    <div class="showcase-card__overlay"></div>

    <div class="showcase-card__inner">
      <h2>Ir a Somnia</h2>
    </div>
  </article>

  <article class="showcase-card showcase-card--descubre">
    <div class="showcase-card__bg"></div>
    <div class="showcase-card__hover-image"></div>
    <div class="showcase-card__overlay"></div>

    <div class="showcase-card__inner">
      <h2>Descubre más de Somnia</h2>
    </div>
  </article>

  <article class="showcase-card showcase-card--islas">
    <div class="showcase-card__bg"></div>
    <div class="showcase-card__hover-image"></div>
    <div class="showcase-card__overlay"></div>

    <div class="showcase-card__inner">
      <h2>Islas</h2>
    </div>
  </article>

  <article class="showcase-card showcase-card--personajes">
    <div class="showcase-card__bg"></div>
    <div class="showcase-card__hover-image"></div>
    <div class="showcase-card__overlay"></div>

    <div class="showcase-card__inner">
      <h2>Personajes</h2>
    </div>
  </article>

  <article class="showcase-card showcase-card--creadores">
    <div class="showcase-card__bg"></div>
    <div class="showcase-card__hover-image"></div>
    <div class="showcase-card__overlay"></div>

    <div class="showcase-card__inner">
      <h2>Equipo de desarrollo</h2>
    </div>
      </article>
    </section>
  </main>

  <script>
    const cards = document.querySelectorAll('.showcase-card');
    const showcase = document.getElementById('showcase');

    cards.forEach(card => {
      card.addEventListener('mouseenter', () => {
        cards.forEach(c => c.classList.remove('active'));
        card.classList.add('active');

        showcase.setAttribute('data-active', card.dataset.bg);
      });
    });
  </script>
</body>
</html>
