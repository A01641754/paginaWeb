<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Datos Personales</title>
    <link rel="stylesheet" href="Registro.css">
</head>
<body>

    <div class="contenedor-registro">
        <h1 class="titulo-registro">Registro</h1>
        
        <form id="form-paso1">
            
            <input type="text" id="nombre" class="caja-input" placeholder="Introducir nombre" required>
            <div id="error-nombre" class="error-debajo">X El nombre no puede contener números.</div>

            <input type="date" id="fecha-nac" class="caja-input" required>
            <div id="error-fecha" class="error-debajo">X Selecciona tu fecha de nacimiento.</div>

            <div class="caja-input caja-nide">
                <label for="nide">Eres usuario de NIDE</label>
                <input type="checkbox" id="nide">
            </div>

            <input type="text" id="colonia" class="caja-input" placeholder="Colonia" required>

            <input type="text" id="contacto" class="caja-input" placeholder="Contacto" required>

            <button type="button" class="btn-continuar" onclick="validarPaso1()">Continuar</button>
        </form>

        <a href="Login.html" class="enlace-login">Iniciar Sesión</a>
    </div>

    <script>
        function validarPaso1()
        {
            document.querySelectorAll('.error-debajo').forEach(e => e.style.display = 'none');

            const nombre = document.getElementById('nombre').value;
            const fecha = document.getElementById('fecha-nac').value;

            let hayErrores = false;

            // Solo acepta letras y espacios
            const regexSoloLetras = /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/;
            if (!regexSoloLetras.test(nombre) || nombre === "")
            {
                document.getElementById('error-nombre').style.display = 'block';
                hayErrores = true;
            }

            if (fecha === "")
            {
                document.getElementById('error-fecha').style.display = 'block';
                hayErrores = true;
            }

            if (!hayErrores)
            {
                // Si todo está bien pasamos al registro2
                window.location.href = 'Registro2.html';
            }
        }
    </script>
</body>
</html>
