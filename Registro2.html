<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Datos de Cuenta</title>
    <link rel="stylesheet" href="Registro.css">
</head>
<body>

    <div class="contenedor-registro">
        <h1 class="titulo-registro">Registro</h1>

        <form id="form-paso2">
            
            <input type="email" id="email" class="caja-input" placeholder="Introducir email" required>
            <div id="error-email" class="error-debajo">X Introduce un email válido.</div>

            <input type="text" id="username" class="caja-input" placeholder="Introducir username" required>
            <div id="error-username" class="error-debajo">X El username ya está registrado a una cuenta.</div>

            <input type="password" id="password" class="caja-input" placeholder="Introducir contraseña" required>
            <div id="error-password" class="error-debajo">X La contraseña solo puede contener letras y números.</div>

            <input type="password" id="confirm-pass" class="caja-input" placeholder="Confirmar contraseña" required>
            <div id="error-confirm" class="error-debajo">X Las contraseñas no coinciden.</div>

            <button type="button" class="btn-continuar" onclick="validarPaso2()">Finalizar Registro</button>
        </form>

        <a href="Login.html" class="enlace-login">Iniciar Sesión</a>
    </div>

    <script>
        function validarPaso2()
        {
            document.querySelectorAll('.error-debajo').forEach(e => e.style.display = 'none');

            const email = document.getElementById('email').value;
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-pass').value;

            let hayErrores = false;

            // Validamos la contraseña que solo acepta letras y números solamente
            const regexLetrasNumeros = /^[a-zA-Z0-9]+$/;
            if (!regexLetrasNumeros.test(pass) || pass === "") {
                document.getElementById('error-password').style.display = 'block';
                hayErrores = true;
            }

            //Revisamos si las dos contraseñas son exactamente iguales
            if (pass !== confirm || confirm === "")
            {
                document.getElementById('error-confirm').style.display = 'block';
                hayErrores = true;
            }

            // Simulación de base de datos MySQL cuando la conectemos jiji (si pone 'admin' sale error)
            if (user === "admin")
            {
                document.getElementById('error-username').style.display = 'block';
                hayErrores = true;
            }

            if (!hayErrores && email !== "")
            {
                alert("¡Excelente! Registro completo. Bienvenido a Somnia.");
                // Aquí ya el ususario se va a la página principal del juego
                // Aquí en el futuro pondremos: window.location.href = 'registro_parte2.html';
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
